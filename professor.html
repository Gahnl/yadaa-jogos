<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Professor - Colégio Saber</title>
  <link rel="stylesheet" href="professor.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<header>
  <img src="Assets/logo cs.png" alt="Logo Escola" class="logo-left">
  <div class="header-text">
    <h1>Colégio Saber de Igaraçu do Tietê</h1>
  </div>
  <img src="Assets/CE_-_LOGO-removebg-preview.png" alt="Logo Sistema" class="logo-right">
</header>

<main class="container">

  <div class="form-card filter-main">
    <h2>Filtros de Turma</h2>
    <label for="serieSelect">Selecione a Série:</label>
    <select id="serieSelect">
      <option value="">Selecione a série</option>
    </select>

    <label for="materiaSelect">Selecione a Matéria:</label>
    <select id="materiaSelect">
      <option value="">Selecione a série primeiro</option>
    </select>

    <label for="bimestreNotas">Selecione o Bimestre:</label>
    <select id="bimestreNotas">
      <option value="">Selecione o bimestre</option>
      <option value="1">1º Bimestre</option>
      <option value="2">2º Bimestre</option>
      <option value="3">3º Bimestre</option>
      <option value="4">4º Bimestre</option>
    </select>
  </div>

  <hr>

  <h2>Lançar Notas</h2>
  <div class="form-card">
    <p id="mensagemNotas" class="texto-informativo">
      Selecione a matéria, série e bimestre no topo para lançar as notas.
    </p>

    <div id="secaoNotas" style="display:none;">
      <table id="tabelaNotas" class="tabela-cabecalho-roxo">
        <thead>
          <tr>
            <th>Aluno</th>
            <th>P1</th> <th>P2</th> <th>Trabs</th> <th>Recup</th> <th>Média</th>
            <th>Faltas</th>
          </tr>
        </thead>
        <tbody id="corpoTabelaNotas"></tbody>
      </table>
      <button id="btnSalvarNotas">Salvar Notas</button>
    </div>
  </div>

  <h2>Lançar Faltas</h2>
  <div class="form-card">
    <div id="listaAlunosFaltas"></div>

    <label for="dataFalta">Data da Aula:</label>
    <input type="date" id="dataFalta">

    <button id="btnSalvarFaltas">Salvar Faltas</button>
  </div>

  <h2>Lançar Conteúdo</h2>
  <div class="form-card">
    <label for="conteudo">Conteúdo:</label>
    <textarea id="conteudo" rows="4" placeholder="Digite aqui o conteúdo da aula"></textarea>

    <label for="dataAula">Data da Aula:</label>
    <input type="date" id="dataAula">

    <button id="btnSalvarConteudo">Salvar Conteúdo</button>
  </div>

  <div class="titulo-lista-container">
    <h3>Conteúdos Lançados</h3>
    <button type="button" id="btnToggleLista" onclick="window.toggleLista()" class="btn-esconder-pequeno">Esconder</button>
  </div>

  <div class="pdf-filter-container">
    <label for="filtroBimestrePDF">Gerar Relatório:</label>
    <select id="filtroBimestrePDF" class="input-bimestre-pdf">
        <option value="1">1º Bimestre</option>
        <option value="2">2º Bimestre</option>
        <option value="3">3º Bimestre</option>
        <option value="4">4º Bimestre</option>
    </select>
    <button id="btnGerarPDF" onclick="window.gerarPDFConteudo()">📄 Baixar PDF do Bimestre</button>
  </div>

  <ul id="listaConteudos" class="list-card"></ul>

  <div class="btn-logout-central">
    <a href="index.html" class="btn-logout">Sair do sistema</a>
  </div>
</main>

<footer>
  <p>© 2025 - Colégio Saber Igaraçu do Tietê</p>
</footer>

<script type="module" src="js/professor.js"></script>
</body>
</html>
